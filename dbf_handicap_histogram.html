<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Handicap-fordelingsanalyse for DBf klubber. Visualiser og analyser handicap-fordeling blandt danske bridgespillere.">
<meta name="theme-color" content="#0f766e">
<meta name="color-scheme" content="light dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Handicap Fordeling">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./favicon.svg">
<link rel="manifest" href="./manifest.json">
<meta property="og:title" content="DBf Handicap Fordeling">
<meta property="og:description" content="Handicap-fordelingsanalyse for DBf klubber. Visualiser og analyser handicap-fordeling blandt danske bridgespillere.">
<meta property="og:type" content="website">
<meta property="og:locale" content="da_DK">
<meta property="og:image" content="./favicon.svg">
<link rel="sitemap" href="./sitemap.xml" type="application/xml">
<title>DBf Handicap Fordeling</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="./css/analyzer-theme.css">
<link rel="stylesheet" href="./css/dbf_handicap_histogram.css">
<script>if(localStorage.getItem('dbf_theme')!=='light')document.documentElement.removeAttribute('data-theme');else document.documentElement.setAttribute('data-theme','light');</script>
</head>
<body>
<main class="page">
<header>
  <h1>DBf Handicap Fordeling</h1>
  <p id="headerDesc">Danmarks Bridgeforbund</p>
  <div class="update-row">
    <button class="help-btn" id="fetchRemoteBtn" type="button" title="Hent HACAlle.php direkte fra DBf">🌐 Hent fra DBf</button>
    <button class="help-btn" id="shareLinkBtn" type="button" title="Kopiér link med nuværende filtre">🔗 Del link</button>
    <button class="help-btn" id="exportChartBtn" type="button" title="Download diagram som PNG">💾 Gem diagram</button>
    <button class="help-btn" id="helpBtn" type="button">? Hjælp</button>
    <button class="clear-btn" id="clearBtn">🗑 Ryd cache</button>
    <span class="data-age" id="fetchStatus"></span>
    <span class="data-age" id="dataAge"></span>
  </div>
</header>

<div id="noDataOverlay">
  <div id="noDataBox">
    <button id="closeOverlay" type="button" title="Luk">✕</button>
    <h2>Sådan henter du data</h2>
    <p>Klik på knappen "🌐 Hent fra DBf" ovenfor for at hente den nyeste handicapliste automatisk.</p>
  </div>
</div>

<div class="controls">
  <div class="control-group">
    <label>Filtrer efter klub</label>
    <div class="club-search-wrapper">
      <input type="text" id="clubSearch" placeholder="Søg klub eller 'Alle klubber'&hellip;" autocomplete="off">
      <div id="clubDropdown"></div>
    </div>
    <div id="pillArea"></div>
    <div class="bins-control" style="gap:.5rem;flex-wrap:wrap;margin-top:.6rem">
      <button class="help-btn" id="clearClubsBtn" type="button">Fjern alle klubber</button>
    </div>
  </div>
  <div class="control-group" style="max-width:220px">
    <label>HC interval</label>
    <div class="bins-control" style="gap:.5rem">
      <input type="number" id="hcMin" value="-10" min="-10" max="52" step="any" inputmode="decimal" style="width:78px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.5rem .6rem;color:var(--text);font-family:'Space Mono',monospace;font-size:.85rem;outline:none">
      <span style="color:var(--muted);font-size:.85rem">–</span>
      <input type="number" id="hcMax" value="52" min="-10" max="52" step="any" inputmode="decimal" style="width:78px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.5rem .6rem;color:var(--text);font-family:'Space Mono',monospace;font-size:.85rem;outline:none">
    </div>
    <div class="bins-control" style="gap:.5rem;flex-wrap:wrap;margin-top:.6rem">
      <button class="help-btn" id="setMinBtn" type="button">Min</button>
      <button class="help-btn" id="inactiveCapBtn" type="button">Max 51,99</button>
      <button class="help-btn" id="clearFiltersBtn" type="button">Ryd filtre</button>
    </div>
  </div>
  <div class="control-group" style="max-width:260px">
    <label>Antal søjler</label>
    <div class="bins-control">
      <input type="range" id="binSlider" min="10" max="100" value="62">
      <span id="binValue">62</span>
    </div>
  </div>
  <div class="control-group" style="max-width:200px">
    <label>&nbsp;</label>
    <div class="bins-control">
      <input type="checkbox" id="percentMode" style="width:18px;height:18px;cursor:pointer">
      <label for="percentMode" style="font-family:'IBM Plex Mono',monospace;font-size:0.88rem;color:var(--text);text-transform:none;letter-spacing:normal;cursor:pointer;margin:0">% af klubstørrelse</label>
    </div>
  </div>
  <div class="control-group" style="max-width:200px">
    <label>&nbsp;</label>
    <div class="bins-control">
      <input type="checkbox" id="cdfMode" style="width:18px;height:18px;cursor:pointer">
      <label for="cdfMode" style="font-family:'IBM Plex Mono',monospace;font-size:0.88rem;color:var(--text);text-transform:none;letter-spacing:normal;cursor:pointer;margin:0">Vis kumulativ kurve</label>
    </div>
  </div>
  <div class="control-group" style="max-width:200px">
    <label>&nbsp;</label>
    <div class="bins-control">
      <input type="checkbox" id="trendMode" style="width:18px;height:18px;cursor:pointer">
      <label for="trendMode" style="font-family:'IBM Plex Mono',monospace;font-size:0.88rem;color:var(--text);text-transform:none;letter-spacing:normal;cursor:pointer;margin:0">Vis trendlinje</label>
    </div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="label">Spillere</div><div class="value" id="sN">—</div></div>
  <div class="stat-card"><div class="label">Gennemsnit</div><div class="value" id="sMean">—</div></div>
  <div class="stat-card"><div class="label">Median</div><div class="value" id="sMedian">—</div></div>
  <div class="stat-card"><div class="label">Minimum</div><div class="value neg" id="sMin">—</div></div>
  <div class="stat-card"><div class="label">Maximum</div><div class="value" id="sMax">—</div></div>
  <div class="stat-card"><div class="label">Std.afv.</div><div class="value" id="sStd">—</div></div>
</div>

<div class="chart-wrapper">
  <canvas id="hChart"></canvas>
</div>

</main>

<nav class="tool-home-link" aria-label="Navigation">
  <a href="./dbf_dashboard.html">Til forsiden</a>
</nav>

<script src="./js/utils.js"></script>
<script src="./js/dbf_handicap_histogram.js"></script>
<script src="./js/theme.js"></script>
</body>
</html>
