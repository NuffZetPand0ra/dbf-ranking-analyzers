services:
  - type: web
    name: dbf-ranking-analyzers
    runtime: node
    plan: starter
    disk:
      name: cache-disk
      mountPath: /var/data
      sizeGB: 1
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPEN_ROUTE
        value: /
      - key: CACHE_DB_PATH
        value: /var/data/tournament-cache.sqlite
      - key: TURN_MUTABLE_TTL_HOURS
        value: 12
      - key: TOURNAMENT_IMMUTABLE_DAYS
        value: 60
      - key: TURN_CACHE_PARSER_VERSION
        value: turn-v1
      - key: TURN_CACHE_PURGE_OLD_VERSIONS_ON_START
        value: "0"
      - key: GOOGLE_SITE_VERIFICATION_ID
        sync: false
